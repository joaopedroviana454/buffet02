<section class="formulario">
    <link rel="stylesheet" href="formulario.css">
    <h2>Organização da Festa</h2>

    <form>

        <label>Classificação da festa</label>
        <input type="text" placeholder="*insira">

        <label>Quantidade de convidados</label>
        <input type="text" placeholder="*insira">

        <label>Tipo de buffet</label>
        <input
        type="text"
        placeholder="*vegano, churrasco ou etc">

        <label>Data e horário do buffet</label>

        <div class="data-hora">

            <input type="text" placeholder="00/00">
            <input type="text" placeholder="00:00">

        </div>

        <div class="separador"></div>

        <h3>
            Agora insira suas informações
            <br>
            (para confirmar cliente e local da festa)
        </h3>

        <div class="separador"></div>

        <input type="text" placeholder="Nome completo">

        <input type="text" placeholder="CPF">

        <input type="text" placeholder="Email">

        <h3>Local da festa</h3>

        <input type="text" placeholder="Bairro">

        <input type="text" placeholder="Número">

        <input type="text" placeholder="Rua">

        <input type="text" placeholder="CEP">

        <input type="text" placeholder="Cidade">

        <button type="submit">
            <a href="confirmacao.html">
            Enviar
            </a>
        </button>

    </form>

</section>
